# H2 Database 設定
spring.datasource.url=jdbc:h2:file:./data/snsdb
# DB接続先：ファイルモードで ./data/snsdb に保存（再起動後もデータ残る）
spring.datasource.driver-class-name=org.h2.Driver
# H2 Database のドライバークラスを指定
spring.datasource.username=sa
# DB接続用のユーザー名（H2のデフォルト）
spring.datasource.password=
# DB接続用のパスワード（空 = パスワードなし）

# JPA / Hibernate 設定
spring.jpa.hibernate.ddl-auto=update
# テーブル自動生成：update = 既存テーブルがあれば更新、なければ作成
spring.jpa.show-sql=true
# 実行されるSQLをコンソールに表示（デバッグ用）
spring.jpa.properties.hibernate.format_sql=true
# SQLを見やすく整形して表示

# H2 Console 設定（ブラウザでDBの中身を確認できる）
spring.h2.console.enabled=true
# H2 Console を有効化
spring.h2.console.path=/h2-console
# アクセスURL：http://localhost:8080/h2-console